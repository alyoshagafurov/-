{% extends "base.html" %}
{% block title %}Вход — Pixeloff{% endblock %}

{% block content %}
<form class="form" data-auth-form="login">
  <h1>Вход</h1>
  <div class="alert alert-error hidden" data-auth-error></div>
  <div class="field">
    <label>Email</label>
    <input type="email" name="email" required autocomplete="email">
  </div>
  <div class="field">
    <label>Пароль</label>
    <input type="password" name="password" required autocomplete="current-password">
  </div>
  <button class="btn" type="submit">Войти</button>
  <div class="form-foot">Нет аккаунта? <a href="/register">Зарегистрироваться</a></div>
</form>
{% endblock %}
