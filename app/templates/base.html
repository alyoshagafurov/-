<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pixeloff — автоматическая очистка водяных знаков с фотографий недвижимости{% endblock %}</title>
  <meta name="description" content="Сервис pixeloff позволяет быстро привести ваши фото в порядок перед демонстрацией клиентам.">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/">
        <img src="/static/logo-header.jpg" alt="Pixeloff" class="brand-logo" width="131" height="40">
      </a>
      <nav class="nav">
        <a href="/" class="{% block nav_home %}{% endblock %}">Главная</a>
        <a href="/tariffs" class="{% block nav_tariffs %}{% endblock %}">Тарифы</a>
        {% if user %}
          <a href="/dashboard">Кабинет</a>
          {% if user.is_admin %}<a href="/admin">Админка</a>{% endif %}
          <a href="/logout">Выйти</a>
        {% else %}
          <a href="/login">Войти</a>
          <a class="btn btn-sm btn-outline" href="/register">Регистрация</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      © 2026 Pixeloff.ru · удаляем водяные знаки с фото
    </div>
  </footer>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
